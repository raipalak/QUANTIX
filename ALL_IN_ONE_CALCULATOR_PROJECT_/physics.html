<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Physics Calculator</title>
<link rel="stylesheet" href="css/theme.css">
<script src="js/common.js"></script>
<style>
:root{
  --bg1:#fbc2eb;
  --bg2:#a6c1ee;
  --card:#ffffffcc;
  --primary:#ff2f92;
  --accent:#72efdd;
  --text:#333;
}
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:8px 14px;
  border-radius:10px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  font-weight:500;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.2s;
  z-index:999;
}

.back-btn:hover{
  background:var(--accent-soft);
  color:var(--accent);
}
*{
  box-sizing:border-box;
  font-family: "Arial", sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}
<div class="back-btn" onclick="goBack()">← Back</div>
.card{
  background:var(--card);
  width:420px;
  padding:26px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

h1{
  color:var(--primary);
  margin-bottom:10px;
}

p{
  font-size:0.95rem;
  line-height:1.5;
  margin:10px 0;
}

.joke{
  margin-top:14px;
  padding:12px;
  background:#fff;
  border-radius:16px;
  font-size:0.9rem;
}

.emoji{
  font-size:2rem;
  margin-bottom:8px;
}

.footer{
  margin-top:16px;
  font-size:0.75rem;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="card">
  <div class="emoji">⚡🧪</div>
  <h1>Physics Calculator</h1>

  <p>
    Sorry for the inconvenience 🥺<br>
    We’re currently working hard on this feature.
  </p>

  <div class="joke">
    😄 <b>Physics Joke:</b><br>
    Why can’t you trust atoms?<br>
    Because they make up <i>everything</i> 😭
  </div>

  <p>
    Please check back soon ✨<br>
    Have a nice day! 💖
  </p>

  <div class="footer">
    — Ultimate Calculator Team
  </div>
</div>

<script>
alert(
  "⚡ Physics Calculator\n\n" +
  "Sorry for the inconvenience 😅\n" +
  "We’re working on this feature.\n\n" +
  "Have a nice day! 💖"
);
function goBack(){
  if(document.referrer){
    history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
