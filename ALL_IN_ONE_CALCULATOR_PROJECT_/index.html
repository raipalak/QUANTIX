<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantix</title>

<link rel="stylesheet" href="css/theme.css">
<script src="js/common.js"></script>

<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --sub:#64748b;
  --border:#e2e8f0;
  --accent:#6366f1;
  --accent-soft:#eef2ff;
}

/* DARK MODE */
.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --sub:#94a3b8;
  --border:#334155;
  --accent:#818cf8;
  --accent-soft:#1e293b;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* INTRO */
.intro{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(-45deg,#eef2ff,#e0e7ff,#f8fafc,#ede9fe);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
  z-index:10;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* cursor glow */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  background:radial-gradient(circle,rgba(99,102,241,0.25),transparent);
  pointer-events:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* card */
.card{
  position:relative;
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  z-index:2;
}

/* 🔥 REPLACED AVATAR WITH TEXT LOGO */
.logo{
  font-size:2.5rem;
  font-weight:700;
  margin-bottom:20px;
  background:linear-gradient(90deg,#6366f1,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* heading */
h1{
  font-size:2rem;
  margin-bottom:10px;
  background:linear-gradient(90deg,#6366f1,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.tagline{
  color:#64748b;
  margin-bottom:20px;
  min-height:50px;
}

/* button */
.enter-btn{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
.app{
  display:none;
}

.container{
  display:flex;
}

.sidebar{
  width:230px;
  height:100vh;
  background:var(--card);
  border-right:1px solid var(--border);
  padding:20px;
}

.sidebar h2{
  color:var(--accent);
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--sub);
}

.sidebar button:hover{
  background:var(--accent-soft);
  color:var(--accent);
}

.main{
  flex:1;
  padding:25px;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.search{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.menu button{
  padding:20px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
}

.menu button:hover{
  background:var(--accent-soft);
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div class="intro" id="intro">

<div class="card">

<div class="logo">Quantix</div>

<h1>Meet your Calculator Assistant 🤖</h1>

<div class="tagline" id="text"></div>

<button class="enter-btn" onclick="enterApp()">Start Solving →</button>

</div>

</div>

<!-- DASHBOARD -->
<div class="app" id="app">

<div class="container">

<div class="sidebar">
<h2>🧮 Quantix</h2>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<div class="top">
<h1>Dashboard</h1>
<input class="search" placeholder="Search..." onkeyup="searchCalc(this.value)">
</div>

<div class="menu">
<button onclick="openPage('basic.html')">🧮 Basic</button>
<button onclick="openPage('scientific.html')">🔬 Scientific</button>
<button onclick="openPage('unit.html')">📏 Unit</button>
<button onclick="openPage('physics.html')">⚡ Physics</button>
<button onclick="openPage('finance.html')">💰 Finance</button>
<button onclick="openPage('gpa.html')">🎓 GPA</button>
<button onclick="openPage('matrix.html')">🧮 Matrix</button>
<button onclick="openPage('datetime.html')">🕒 Date</button>
<button onclick="openPage('currency.html')">🌍 Currency</button>
<button onclick="openPage('geometry.html')">📐 Geometry</button>
<button onclick="openPage('marks.html')">🔁 Marks</button>
<button onclick="openPage('calculus.html')">∫ Calculus</button>
</div>

</div>

</div>

</div>

<script>
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left = e.clientX+"px";
cursor.style.top = e.clientY+"px";
});

/* typing */
const text = "Stop jumping between tools. One place. Everything you need.";
let i=0;
function type(){
if(i<text.length){
document.getElementById("text").innerHTML+=text[i];
i++;
setTimeout(type,25);
}
}
type();

/* enter */
function enterApp(){
document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";
}

/* nav */
function openPage(p){
window.location.href=p;
}

/* dark */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* search */
function searchCalc(val){
let btns=document.querySelectorAll(".menu button");
val=val.toLowerCase();
btns.forEach(b=>{
b.style.display=b.innerText.toLowerCase().includes(val)?"block":"none";
});
}

function goBack(){
if(document.referrer){
history.back();
} else {
window.location.href = "index.html";
}
}
</script>

</body>
</html>
