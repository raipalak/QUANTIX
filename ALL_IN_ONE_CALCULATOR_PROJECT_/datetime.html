<!-- datetime.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="css/theme.css">
<script src="js/common.js"></script>  
<meta charset="UTF-8">
<title>Date & Time – World Clock</title>

<style>
:root{
  --bg1:#fbc2eb;
  --bg2:#a6c1ee;
  --card:#ffffffcc;
  --primary:#ff2f92;
  --accent:#72efdd;
  --text:#333;
}
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:8px 14px;
  border-radius:10px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  font-weight:500;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.2s;
  z-index:999;
}

.back-btn:hover{
  background:var(--accent-soft);
  color:var(--accent);
}
*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}
<div class="back-btn" onclick="goBack()">← Back</div>
.card{
  background:var(--card);
  width:440px;
  padding:24px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

h2{
  color:var(--primary);
  margin-bottom:10px;
}

select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  font-size:0.95rem;
}

.time{
  font-size:1.8rem;
  font-weight:bold;
  margin-top:10px;
  color:#3a0ca3;
}

.date{
  margin-top:6px;
  font-size:1rem;
}

.zone{
  margin-top:8px;
  font-size:0.85rem;
  opacity:0.75;
}

.footer{
  margin-top:16px;
  font-size:0.75rem;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="card">
  <h2>🕒 World Date & Time</h2>

  <select id="timezone">
    <option value="Asia/Kolkata">India 🇮🇳 (Asia/Kolkata)</option>
    <option value="Asia/Kathmandu">Nepal 🇳🇵 (Asia/Kathmandu)</option>
    <option value="UTC">UTC 🌍</option>
    <option value="America/New_York">USA – New York 🇺🇸</option>
    <option value="America/Los_Angeles">USA – Los Angeles 🇺🇸</option>
    <option value="Europe/London">UK 🇬🇧 (London)</option>
    <option value="Europe/Paris">France 🇫🇷 (Paris)</option>
    <option value="Europe/Berlin">Germany 🇩🇪 (Berlin)</option>
    <option value="Asia/Dubai">UAE 🇦🇪 (Dubai)</option>
    <option value="Asia/Tokyo">Japan 🇯🇵 (Tokyo)</option>
    <option value="Asia/Shanghai">China 🇨🇳 (Shanghai)</option>
    <option value="Australia/Sydney">Australia 🇦🇺 (Sydney)</option>
    <option value="Africa/Cairo">Egypt 🇪🇬 (Cairo)</option>
    <option value="America/Toronto">Canada 🇨🇦 (Toronto)</option>
    <option value="America/Sao_Paulo">Brazil 🇧🇷 (São Paulo)</option>
  </select>

  <div class="time" id="time">--:--:--</div>
  <div class="date" id="date">---</div>
  <div class="zone" id="zone">Timezone: —</div>

  <div class="footer">
    Powered by JavaScript Intl API ✨
  </div>
</div>

<script>
const timeEl = document.getElementById("time");
const dateEl = document.getElementById("date");
const zoneEl = document.getElementById("zone");
const tzSelect = document.getElementById("timezone");

function updateTime(){
  const tz = tzSelect.value;
  const now = new Date();

  const timeFormatter = new Intl.DateTimeFormat("en-US",{
    timeZone: tz,
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:true
  });

  const dateFormatter = new Intl.DateTimeFormat("en-US",{
    timeZone: tz,
    weekday:"long",
    year:"numeric",
    month:"long",
    day:"numeric"
  });

  timeEl.textContent = timeFormatter.format(now);
  dateEl.textContent = dateFormatter.format(now);
  zoneEl.textContent = "Timezone: " + tz;
}

tzSelect.addEventListener("change", updateTime);
setInterval(updateTime,1000);
updateTime();
function goBack(){
  if(document.referrer){
    history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
